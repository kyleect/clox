name: Verify & Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  BUILD_TYPE: Release

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Deps
        run: sudo apt-get update && sudo apt-get install -y libreadline8 libreadline-dev

      - name: Generate Version C File
        run: ./scripts/generate_version_c.sh

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Test (With Coverage)
        run: ./scripts/coverage.sh

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: clox
          path: ./build/clox
          if-no-files-found: error
          overwrite: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lcov.info
          path: ./lcov.info
          if-no-files-found: error
          overwrite: true

  release:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create a release
    steps:
      - name: Checkout repository (including tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch tags for changelog

      - name: Download binary artifact from verify job
        uses: actions/download-artifact@v4
        with:
          name: clox
          path: ./release

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          RELEASE_NAME="Release ${TAG}"
          # Grab the most recent commit message for the release notes (optional)
          NOTES="$(git log -1 --pretty=%B ${TAG})"
          gh release create "${TAG}" \
            --title "${RELEASE_NAME}" \
            --notes "${NOTES}" \
            ./release/clox
